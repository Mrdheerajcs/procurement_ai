
<!DOCTYPE html>
<html>
<head>

    <title>E-Procurement AI</title>

    <style>

        body {
            font-family: Arial;
            background: #f5f5f5;
            padding: 30px;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 800px;
            margin: auto;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        input,
        textarea,
        button {
            width: 100%;
            margin-top: 10px;
            padding: 10px;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }

        pre {
            background: #f0f0f0;
            padding: 10px;
            overflow-x: auto;
        }

    </style>

</head>
<body>

<div class="container">

    <h1>E-Procurement AI System</h1>


    <h2>Generate Tender</h2>


    <input
        type="text"
        id="requirement"
        placeholder="Enter Requirement"
    >


    <input
        type="number"
        id="department_id"
        placeholder="Department ID (Optional)"
    >


    <input
        type="text"
        id="mpr_type_id"
        placeholder="MPR Type ID (Optional)"
    >


    <input
        type="text"
        id="document_path"
        placeholder="Document Path (Optional)"
    >


    <button onclick="generateTender()">
        Generate Tender
    </button>


    <h3>API Response</h3>

    <pre id="output"></pre>


    <hr>


    <h2>Upload PDF / Word</h2>


    <input
        type="text"
        id="category"
        placeholder="Category"
    >


    <input
        type="text"
        id="sub_category"
        placeholder="Sub Category"
    >


    <input
        type="file"
        id="pdfFile"
        accept=".pdf,.docx"
    >


    <button onclick="uploadPDF()">
        Upload File
    </button>


    <div id="uploadResult"></div>


</div>


<script>

async function generateTender() {

    const requirement = document.getElementById(
        "requirement"
    ).value;


    const department_id = document.getElementById(
        "department_id"
    ).value;


    const mpr_type_id = document.getElementById(
        "mpr_type_id"
    ).value;


    const document_path = document.getElementById(
        "document_path"
    ).value;


    const payload = {

        requirement: requirement,

        department_id:
        department_id
            ? parseInt(department_id)
            : null,

        mpr_type_id:
        mpr_type_id || null,

        document_path:
        document_path || null
    };


    const response = await fetch(

        "/api/ai/generate-tender",

        {
            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify(payload)
        }
    );


    const data = await response.json();


    document.getElementById(
        "output"
    ).innerText = JSON.stringify(
        data,
        null,
        4
    );
}


async function uploadPDF() {

    const fileInput = document.getElementById(
        "pdfFile"
    );


    const category = document.getElementById(
        "category"
    ).value;


    const sub_category = document.getElementById(
        "sub_category"
    ).value;


    const formData = new FormData();

    formData.append(
        "file",
        fileInput.files[0]
    );

    formData.append(
        "category",
        category
    );

    formData.append(
        "sub_category",
        sub_category
    );


    const response = await fetch(

        "/upload-pdf",

        {
            method: "POST",
            body: formData
        }
    );


    const result = await response.json();


    document.getElementById(
        "uploadResult"
    ).innerHTML = `

        <pre>
${JSON.stringify(result, null, 4)}
        </pre>

    `;
}

</script>

</body>
</html>
